name: Build

on: [push, pull_request]

jobs:
  Build:
    name: ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    container: ${{ matrix.platform.container }}

    defaults:
      run:
        shell: ${{ matrix.platform.shell }}

    strategy:
      fail-fast: false
      matrix:
        platform:
          - { name: Windows (MSVC),                os: windows-latest, build-spirv-cross: true,  vendored: false, shell: sh, msvc: true, artifact: 'SDL3_shadercross-VC-x64' }
          - { name: Windows (MSVC) Static,         os: windows-latest, build-spirv-cross: true,  vendored: false, shell: sh, msvc: true, artifact: 'SDL3_shadercross-VC-x64-static', static-only: true }
          - { name: Windows (mingw64),             os: windows-latest, build-spirv-cross: false, vendored: false, shell: 'msys2 {0}', msystem: mingw64, msys-env: mingw-w64-x86_64, artifact: 'SDL3_shadercross-mingw64' }
          - { name: Ubuntu 24.04,                  os: ubuntu-24.04,   build-spirv-cross: true,  vendored: false, shell: sh, artifact: 'SDL3_shadercross-linux-x64' }
          - { name: Steam Linux Runtime (Sniper),  os: ubuntu-latest,  build-spirv-cross: false,  vendored: true, shell: sh, artifact: 'SDL3_shadercross-slrsniper', container: 'registry.gitlab.steamos.cloud/steamrt/sniper/sdk:latest' }
          - { name: macOS,                         os: macos-latest,   build-spirv-cross: true,  vendored: true,  shell: sh, artifact: 'SDL3_shadercross-macos-arm64', cmake-arguments: '-DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 -DCMAKE_C_FLAGS="-mmacosx-version-min=11.0" -DCMAKE_CXX_FLAGS="-mmacosx-version-min=11.0"' }

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up Ninja
        uses: ./.github/actions/setup-ninja
        if: ${{ !contains(matrix.platform.shell, 'msys2') && !contains(matrix.platform.container, 'steamrt') }}
      - uses: ilammy/msvc-dev-cmd@v1
        if: ${{ matrix.platform.msvc }}
        with:
          arch: x64
      - name: Set up MSYS2
        if: ${{ matrix.platform.shell == 'msys2 {0}' }}
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.platform.msystem }}
          install: >-
            ${{ matrix.platform.msys-env }}-cmake
            ${{ matrix.platform.msys-env }}-gcc
            ${{ matrix.platform.msys-env }}-ninja
            ${{ (!matrix.platform.vendored && format('{0}-spirv-cross', matrix.platform.msys-env)) || '' }}
      - name: Set up SDL
        id: sdl
        uses: libsdl-org/setup-sdl@main
        with:
          cmake-arguments: ${{ matrix.platform.cmake-arguments }}
          cmake-generator: Ninja
          version: 3-head
          sdl-test: true
          shell: ${{ matrix.platform.shell }}
          install-linux-dependencies: true
          discriminator: ${{ matrix.platform.artifact }}
      - name: Install Linux requirements
        if: ${{ contains(matrix.platform.os, 'ubuntu') }}
        run: |
          wget https://github.com/NixOS/patchelf/releases/download/0.18.0/patchelf-0.18.0-x86_64.tar.gz
          tar xf patchelf-0.18.0-x86_64.tar.gz ./bin/patchelf
          echo "${PWD}/bin" >>$GITHUB_PATH
          sudo apt-get update -y
          sudo apt-get install -y patchelf libxrandr-dev libjson-perl
      - name: Install macOS requirements
        if: ${{ runner.os == 'macOS' }}
        run: |
          brew install bison cpanm
          echo "/opt/homebrew/opt/bison/bin" >>$GITHUB_PATH
          cpanm install JSON
      - name: Download DirectXShaderCompiler binaries
        if: ${{ !matrix.platform.vendored && runner.os != 'macOS' }}
        run: |
          cmake -P build-scripts/download-prebuilt-DirectXShaderCompiler.cmake
          echo "DirectXShaderCompiler_ROOT=${PWD}/external/DirectXShaderCompiler-binaries" >>${GITHUB_ENV}
      - name: Build SPIRV-Cross
        if: ${{ matrix.platform.build-spirv-cross }}
        run: |
          cmake -S external/SPIRV-Cross -B spirv_cross_build -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DSPIRV_CROSS_SHARED=ON \
            -DSPIRV_CROSS_STATIC=ON \
            -DCMAKE_INSTALL_PREFIX=${PWD}/spirv_cross_prefix \
            ${{ matrix.platform.cmake-arguments }}
          cmake --build spirv_cross_build
          cmake --install spirv_cross_build

          spirv_cross_prefix=${PWD}/spirv_cross_prefix
          if test "x${{ (matrix.platform.msvc && 'msvc') || '' }}" = "xmsvc"; then
            spirv_cross_prefix=$(cygpath -w "${spirv_cross_prefix}")
          fi
          joiner="${{ (runner.os == 'Windows' && ';') || ':' }}"
          echo "spirv_cross_c_shared_ROOT=${spirv_cross_prefix}${joiner}${spirv_cross_prefix}/share/spirv_cross_c_shared" >>${GITHUB_ENV}

      - name: Configure (CMake)
        run: |
          cmake -S . -B build -GNinja \
            -DSDLSHADERCROSS_TESTS=ON \
            -DSDLSHADERCROSS_TESTS_TRACKMEM=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DSDLSHADERCROSS_SHARED=${{ matrix.platform.static-only && 'OFF' || 'ON' }} \
            -DSDLSHADERCROSS_STATIC=ON \
            -DSDLSHADERCROSS_VENDORED=${{ matrix.platform.vendored }} \
            -DSDLSHADERCROSS_CLI=ON \
            -DSDLSHADERCROSS_WERROR=ON \
            -DSDLSHADERCROSS_INSTALL=ON \
            -DSDLSHADERCROSS_INSTALL_RUNTIME=ON \
            -DSDLSHADERCROSS_INSTALL_CPACK=ON \
            -DSDLSHADERCROSS_INSTALL_MAN=ON \
            -DCMAKE_INSTALL_PREFIX="${PWD}/prefix" \
            ${{ matrix.platform.cmake-arguments }}

      - name: Build (CMake)
        id: build
        run: |
          cmake --build build --config Release --parallel --verbose

      - name: Install (CMake)
        id: install
        if: ${{ always() && steps.build.outcome == 'success' }}
        run: |
          cmake --install build/ --config Release
          echo "SDL3_shadercross_ROOT=${PWD}/prefix" >>${GITHUB_ENV}

      - name: Package (CPack)
        id: package
        if: ${{ always() && steps.build.outcome == 'success' }}
        run: |
          cmake --build build/ --target package

      - name: Collect static libs for linking (MSVC static only)
        id: collect-static
        if: ${{ always() && steps.build.outcome == 'success' && matrix.platform.static-only }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path static-artifact/lib
          New-Item -ItemType Directory -Force -Path static-artifact/include

          # SDL3_shadercross static lib
          Copy-Item prefix/lib/SDL3_shadercross-static.lib static-artifact/lib/ -ErrorAction SilentlyContinue
          Copy-Item prefix/lib/SDL3_shadercross.lib        static-artifact/lib/ -ErrorAction SilentlyContinue

          # SPIRV-Cross static libs (all components you might need)
          Get-ChildItem spirv_cross_prefix/lib/*.lib | ForEach-Object {
            Copy-Item $_ static-artifact/lib/
          }

          # DXC import lib (dxcompiler.lib) — needed at link time; the DLL ships at runtime
          $dxc_root = $env:DirectXShaderCompiler_ROOT
          if ($dxc_root) {
            Get-ChildItem "$dxc_root/lib/*.lib" -ErrorAction SilentlyContinue | ForEach-Object {
              Copy-Item $_ static-artifact/lib/
            }
            # Also grab the DXC DLLs — you still need these at runtime even with static linking
            New-Item -ItemType Directory -Force -Path static-artifact/bin
            Get-ChildItem "$dxc_root/bin/*.dll" -ErrorAction SilentlyContinue | ForEach-Object {
              Copy-Item $_ static-artifact/bin/
            }
          }

          # Headers
          Copy-Item prefix/include -Destination static-artifact/ -Recurse -Force

          # Write a CMake fragment so consumers can just include() it
          @"
          # SDL3_shadercross static link helper
          # Include this file in your CMakeLists.txt after setting SHADERCROSS_STATIC_DIR
          # e.g. include(SDL3_shadercross_static.cmake)

          set(_sc_lib_dir "`${CMAKE_CURRENT_LIST_DIR}/lib")
          set(_sc_inc_dir "`${CMAKE_CURRENT_LIST_DIR}/include")

          add_library(SDL3_shadercross::static STATIC IMPORTED GLOBAL)
          set_target_properties(SDL3_shadercross::static PROPERTIES
            IMPORTED_LOCATION             "`${_sc_lib_dir}/SDL3_shadercross-static.lib"
            INTERFACE_INCLUDE_DIRECTORIES "`${_sc_inc_dir}"
            INTERFACE_LINK_LIBRARIES      [=[
              `${_sc_lib_dir}/spirv-cross-c.lib
              `${_sc_lib_dir}/spirv-cross-core.lib
              `${_sc_lib_dir}/spirv-cross-glsl.lib
              `${_sc_lib_dir}/spirv-cross-hlsl.lib
              `${_sc_lib_dir}/spirv-cross-msl.lib
              `${_sc_lib_dir}/spirv-cross-reflect.lib
              `${_sc_lib_dir}/spirv-cross-util.lib
              `${_sc_lib_dir}/dxcompiler.lib
            ]=]
          )
          "@ | Out-File -Encoding utf8 static-artifact/SDL3_shadercross_static.cmake

      - name: Package (CPack)
        id: package
        if: ${{ always() && steps.build.outcome == 'success' }}
        run: |
          cmake --build build/ --target package

      - name: Tests (CTest)
        id: test
        if: ${{ always() && steps.build.outcome == 'success' }}
        run: |
          cd build/test
          ctest . -V -C Release

      - name: Verify CMake configuration files
        if: ${{ always() && steps.install.outcome == 'success' }}
        run: |
          cmake -S cmake/test -B cmake_config_build -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            ${{ matrix.platform.cmake-arguments }}
          cmake --build cmake_config_build --verbose

      # Original artifact upload (CPack dist) for all non-static jobs
      - uses: actions/upload-artifact@v4
        if: ${{ always() && steps.package.outcome == 'success' && !matrix.platform.static-only }}
        with:
          if-no-files-found: error
          name: ${{ matrix.platform.artifact }}
          path: build/dist/SDL*

      # Static artifact upload — the manually collected lib bundle
      - uses: actions/upload-artifact@v4
        if: ${{ always() && steps.collect-static.outcome == 'success' }}
        with:
          if-no-files-found: error
          name: ${{ matrix.platform.artifact }}
          path: static-artifact/
