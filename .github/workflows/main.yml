name: Build

on: [push, pull_request, workflow_dispatch]

jobs:
  Build:
    name: ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    container: ${{ matrix.platform.container }}

    defaults:
      run:
        shell: ${{ matrix.platform.shell }}

    strategy:
      fail-fast: false
      matrix:
        platform:
          - { name: Windows (MSVC) Static, os: windows-latest, build-spirv-cross: true,  vendored: false, shell: sh, msvc: true, artifact: 'SDL3_shadercross-VC-x64-static', static-only: true }
          - { name: Ubuntu 24.04 Static,   os: ubuntu-24.04,   build-spirv-cross: true,  vendored: false, shell: sh, artifact: 'SDL3_shadercross-linux-x64-static', static-only: true }

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up Ninja
        uses: ./.github/actions/setup-ninja
      - uses: ilammy/msvc-dev-cmd@v1
        if: ${{ matrix.platform.msvc }}
        with:
          arch: x64
      - name: Set up SDL
        id: sdl
        uses: libsdl-org/setup-sdl@main
        with:
          cmake-arguments: ${{ matrix.platform.cmake-arguments }}
          cmake-generator: Ninja
          version: 3-head
          sdl-test: true
          shell: ${{ matrix.platform.shell }}
          install-linux-dependencies: true
          discriminator: ${{ matrix.platform.artifact }}
      - name: Install Linux requirements
        if: ${{ contains(matrix.platform.os, 'ubuntu') }}
        run: |
          wget https://github.com/NixOS/patchelf/releases/download/0.18.0/patchelf-0.18.0-x86_64.tar.gz
          tar xf patchelf-0.18.0-x86_64.tar.gz ./bin/patchelf
          echo "${PWD}/bin" >>$GITHUB_PATH
          sudo apt-get update -y
          sudo apt-get install -y patchelf libxrandr-dev libjson-perl
      - name: Download DirectXShaderCompiler binaries
        if: ${{ !matrix.platform.vendored && runner.os != 'macOS' }}
        run: |
          cmake -P build-scripts/download-prebuilt-DirectXShaderCompiler.cmake
          echo "DirectXShaderCompiler_ROOT=${PWD}/external/DirectXShaderCompiler-binaries" >>${GITHUB_ENV}

      # ── SPIRV-Cross Release ─────────────────────────────────────────────────
      - name: Build SPIRV-Cross (Release)
        if: ${{ matrix.platform.build-spirv-cross }}
        run: |
          cmake -S external/SPIRV-Cross -B spirv_cross_build_release -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DSPIRV_CROSS_SHARED=OFF \
            -DSPIRV_CROSS_STATIC=ON \
            -DCMAKE_INSTALL_PREFIX=${PWD}/spirv_cross_prefix_release \
            ${{ matrix.platform.cmake-arguments }}
          cmake --build spirv_cross_build_release
          cmake --install spirv_cross_build_release

          spirv_cross_prefix=${PWD}/spirv_cross_prefix_release
          if test "x${{ (matrix.platform.msvc && 'msvc') || '' }}" = "xmsvc"; then
            spirv_cross_prefix=$(cygpath -w "${spirv_cross_prefix}")
          fi
          joiner="${{ (runner.os == 'Windows' && ';') || ':' }}"
          echo "spirv_cross_c_shared_ROOT=${spirv_cross_prefix}${joiner}${spirv_cross_prefix}/share/spirv_cross_c_shared" >>${GITHUB_ENV}

      # ── SPIRV-Cross Debug ───────────────────────────────────────────────────
      - name: Build SPIRV-Cross (Debug)
        if: ${{ matrix.platform.build-spirv-cross }}
        run: |
          cmake -S external/SPIRV-Cross -B spirv_cross_build_debug -GNinja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DSPIRV_CROSS_SHARED=OFF \
            -DSPIRV_CROSS_STATIC=ON \
            -DCMAKE_INSTALL_PREFIX=${PWD}/spirv_cross_prefix_debug \
            ${{ matrix.platform.cmake-arguments }}
          cmake --build spirv_cross_build_debug
          cmake --install spirv_cross_build_debug

      # ── SDL_shadercross Release ─────────────────────────────────────────────
      - name: Configure (CMake) Release
        run: |
          cmake -S . -B build_release -GNinja \
            -DSDLSHADERCROSS_TESTS=ON \
            -DSDLSHADERCROSS_TESTS_TRACKMEM=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DSDLSHADERCROSS_SHARED=OFF \
            -DSDLSHADERCROSS_STATIC=ON \
            -DSDLSHADERCROSS_VENDORED=${{ matrix.platform.vendored }} \
            -DSDLSHADERCROSS_CLI=ON \
            -DSDLSHADERCROSS_WERROR=ON \
            -DSDLSHADERCROSS_INSTALL=ON \
            -DSDLSHADERCROSS_INSTALL_RUNTIME=ON \
            -DSDLSHADERCROSS_INSTALL_CPACK=ON \
            -DSDLSHADERCROSS_INSTALL_MAN=ON \
            -DCMAKE_INSTALL_PREFIX="${PWD}/prefix_release" \
            ${{ matrix.platform.cmake-arguments }}

      - name: Build (CMake) Release
        id: build-release
        run: |
          cmake --build build_release --config Release --parallel --verbose

      - name: Install (CMake) Release
        id: install-release
        if: ${{ always() && steps.build-release.outcome == 'success' }}
        run: |
          cmake --install build_release/ --config Release

      # ── SDL_shadercross Debug ───────────────────────────────────────────────
      - name: Configure (CMake) Debug
        run: |
          cmake -S . -B build_debug -GNinja \
            -DSDLSHADERCROSS_TESTS=ON \
            -DSDLSHADERCROSS_TESTS_TRACKMEM=ON \
            -DCMAKE_BUILD_TYPE=Debug \
            -DSDLSHADERCROSS_SHARED=OFF \
            -DSDLSHADERCROSS_STATIC=ON \
            -DSDLSHADERCROSS_VENDORED=${{ matrix.platform.vendored }} \
            -DSDLSHADERCROSS_CLI=ON \
            -DSDLSHADERCROSS_WERROR=ON \
            -DSDLSHADERCROSS_INSTALL=ON \
            -DSDLSHADERCROSS_INSTALL_RUNTIME=ON \
            -DSDLSHADERCROSS_INSTALL_CPACK=ON \
            -DSDLSHADERCROSS_INSTALL_MAN=ON \
            -DCMAKE_INSTALL_PREFIX="${PWD}/prefix_debug" \
            ${{ matrix.platform.cmake-arguments }}

      - name: Build (CMake) Debug
        id: build-debug
        run: |
          cmake --build build_debug --config Debug --parallel --verbose

      - name: Install (CMake) Debug
        id: install-debug
        if: ${{ always() && steps.build-debug.outcome == 'success' }}
        run: |
          cmake --install build_debug/ --config Debug

      # ── Collect Windows ─────────────────────────────────────────────────────
      - name: Collect static libs (Windows MSVC)
        id: collect-static-windows
        if: ${{ always() && steps.build-release.outcome == 'success' && steps.build-debug.outcome == 'success' && matrix.platform.msvc }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path static-artifact/lib/release
          New-Item -ItemType Directory -Force -Path static-artifact/lib/debug
          New-Item -ItemType Directory -Force -Path static-artifact/bin
          New-Item -ItemType Directory -Force -Path static-artifact/include

          # ── Release libs ──
          Copy-Item prefix_release/lib/SDL3_shadercross-static.lib static-artifact/lib/release/ -ErrorAction SilentlyContinue
          Copy-Item prefix_release/lib/SDL3_shadercross.lib        static-artifact/lib/release/ -ErrorAction SilentlyContinue
          Get-ChildItem spirv_cross_prefix_release/lib/*.lib | ForEach-Object {
            Copy-Item $_ static-artifact/lib/release/
          }

          # ── Debug libs + PDBs ──
          Copy-Item prefix_debug/lib/SDL3_shadercross-static.lib static-artifact/lib/debug/ -ErrorAction SilentlyContinue
          Copy-Item prefix_debug/lib/SDL3_shadercross.lib        static-artifact/lib/debug/ -ErrorAction SilentlyContinue
          Get-ChildItem spirv_cross_prefix_debug/lib/*.lib | ForEach-Object {
            Copy-Item $_ static-artifact/lib/debug/
          }
          # PDBs from shadercross debug build
          Get-ChildItem build_debug -Recurse -Filter *.pdb | ForEach-Object {
            Copy-Item $_ static-artifact/lib/debug/
          }
          # PDBs from SPIRV-Cross debug build
          Get-ChildItem spirv_cross_build_debug -Recurse -Filter *.pdb | ForEach-Object {
            Copy-Item $_ static-artifact/lib/debug/
          }

          # ── DXC (release only — prebuilt, no debug variant available) ──
          $dxc_root = $env:DirectXShaderCompiler_ROOT
          if ($dxc_root) {
            Get-ChildItem "$dxc_root/lib/*.lib" -ErrorAction SilentlyContinue | ForEach-Object {
              Copy-Item $_ static-artifact/lib/release/
              Copy-Item $_ static-artifact/lib/debug/   # same import lib for both configs
            }
            Get-ChildItem "$dxc_root/bin/*.dll" -ErrorAction SilentlyContinue | ForEach-Object {
              Copy-Item $_ static-artifact/bin/
            }
          }

          # ── Headers ──
          Copy-Item prefix_release/include -Destination static-artifact/ -Recurse -Force

          # ── CMake helper ──
          @"
          # SDL3_shadercross static link helper
          # Usage: include(SDL3_shadercross_static.cmake)
          set(_sc_dir "`${CMAKE_CURRENT_LIST_DIR}")

          add_library(SDL3_shadercross::static STATIC IMPORTED GLOBAL)

          set_target_properties(SDL3_shadercross::static PROPERTIES
            IMPORTED_LOCATION_RELEASE     "`${_sc_dir}/lib/release/SDL3_shadercross-static.lib"
            IMPORTED_LOCATION_DEBUG       "`${_sc_dir}/lib/debug/SDL3_shadercross-static.lib"
            INTERFACE_INCLUDE_DIRECTORIES "`${_sc_dir}/include"
            INTERFACE_LINK_LIBRARIES      [=[
              `$<`$<CONFIG:Debug>:
                `${_sc_dir}/lib/debug/spirv-cross-c.lib
                `${_sc_dir}/lib/debug/spirv-cross-core.lib
                `${_sc_dir}/lib/debug/spirv-cross-glsl.lib
                `${_sc_dir}/lib/debug/spirv-cross-hlsl.lib
                `${_sc_dir}/lib/debug/spirv-cross-msl.lib
                `${_sc_dir}/lib/debug/spirv-cross-reflect.lib
                `${_sc_dir}/lib/debug/spirv-cross-util.lib
              >
              `$<`$<NOT:`$<CONFIG:Debug>>:
                `${_sc_dir}/lib/release/spirv-cross-c.lib
                `${_sc_dir}/lib/release/spirv-cross-core.lib
                `${_sc_dir}/lib/release/spirv-cross-glsl.lib
                `${_sc_dir}/lib/release/spirv-cross-hlsl.lib
                `${_sc_dir}/lib/release/spirv-cross-msl.lib
                `${_sc_dir}/lib/release/spirv-cross-reflect.lib
                `${_sc_dir}/lib/release/spirv-cross-util.lib
              >
              `${_sc_dir}/lib/release/dxcompiler.lib
            ]=]
          )
          "@ | Out-File -Encoding utf8 static-artifact/SDL3_shadercross_static.cmake

      # ── Collect Linux ───────────────────────────────────────────────────────
      - name: Collect static libs (Linux)
        id: collect-static-linux
        if: ${{ always() && steps.build-release.outcome == 'success' && steps.build-debug.outcome == 'success' && contains(matrix.platform.os, 'ubuntu') }}
        run: |
          mkdir -p static-artifact/lib/release static-artifact/lib/debug static-artifact/bin static-artifact/include

          # ── Release libs ──
          cp prefix_release/lib/libSDL3_shadercross.a static-artifact/lib/release/ 2>/dev/null || true
          find spirv_cross_prefix_release/lib -name "*.a" -exec cp {} static-artifact/lib/release/ \;

          # ── Debug libs ──
          cp prefix_debug/lib/libSDL3_shadercross.a static-artifact/lib/debug/ 2>/dev/null || true
          find spirv_cross_prefix_debug/lib -name "*.a" -exec cp {} static-artifact/lib/debug/ \;

          # ── DXC runtime (prebuilt, no debug variant) ──
          dxc_root="${DirectXShaderCompiler_ROOT}"
          if [ -n "$dxc_root" ]; then
            find "$dxc_root/lib" -name "*.a" -exec cp {} static-artifact/lib/release/ \; 2>/dev/null || true
            find "$dxc_root/bin" -name "*.so*" -exec cp {} static-artifact/bin/ \; 2>/dev/null || true
          fi

          # ── Headers ──
          cp -r prefix_release/include static-artifact/

          # ── CMake helper ──
          cat > static-artifact/SDL3_shadercross_static.cmake << 'EOF'
          # SDL3_shadercross static link helper
          set(_sc_dir "${CMAKE_CURRENT_LIST_DIR}")

          add_library(SDL3_shadercross::static STATIC IMPORTED GLOBAL)

          set_target_properties(SDL3_shadercross::static PROPERTIES
            IMPORTED_LOCATION_RELEASE     "${_sc_dir}/lib/release/libSDL3_shadercross.a"
            IMPORTED_LOCATION_DEBUG       "${_sc_dir}/lib/debug/libSDL3_shadercross.a"
            INTERFACE_INCLUDE_DIRECTORIES "${_sc_dir}/include"
            INTERFACE_LINK_LIBRARIES
              "$<$<CONFIG:Debug>:${_sc_dir}/lib/debug/libspirv-cross-c.a;${_sc_dir}/lib/debug/libspirv-cross-core.a;${_sc_dir}/lib/debug/libspirv-cross-glsl.a;${_sc_dir}/lib/debug/libspirv-cross-hlsl.a;${_sc_dir}/lib/debug/libspirv-cross-msl.a;${_sc_dir}/lib/debug/libspirv-cross-reflect.a;${_sc_dir}/lib/debug/libspirv-cross-util.a>$<$<NOT:$<CONFIG:Debug>>:${_sc_dir}/lib/release/libspirv-cross-c.a;${_sc_dir}/lib/release/libspirv-cross-core.a;${_sc_dir}/lib/release/libspirv-cross-glsl.a;${_sc_dir}/lib/release/libspirv-cross-hlsl.a;${_sc_dir}/lib/release/libspirv-cross-msl.a;${_sc_dir}/lib/release/libspirv-cross-reflect.a;${_sc_dir}/lib/release/libspirv-cross-util.a>"
          )
          EOF

      # ── Tests (Release build) ───────────────────────────────────────────────
      - name: Tests (CTest)
        id: test
        if: ${{ always() && steps.build-release.outcome == 'success' }}
        run: |
          cd build_release/test
          ctest . -V -C Release

      # ── Upload ──────────────────────────────────────────────────────────────
      - uses: actions/upload-artifact@v4
        if: ${{ always() && (steps.collect-static-windows.outcome == 'success' || steps.collect-static-linux.outcome == 'success') }}
        with:
          if-no-files-found: error
          name: ${{ matrix.platform.artifact }}
          path: static-artifact/
